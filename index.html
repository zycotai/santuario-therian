    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-bounce-in { animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.05); } 100% { transform: scale(1); } }

        .tcg-card:hover { transform: translateY(-5px) rotate(1deg); }

</head>
<body class="bg-[#f0f4f8] text-gray-900 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const theriotypesDB = {
            lobo_artico: { name: 'Lobo Ártico', image: 'https://images.unsplash.com/photo-1580227187123-56aa76d49938?w=800&q=80', desc: 'Resistente y ferozmente leal. Tu alma pertenece a las nieves eternas.', stats: { agilidad: 80, fuerza: 85, misticismo: 70 }, color: 'from-blue-100 to-blue-300', text: 'text-blue-900', border: 'border-blue-500' },
            lobo_negro: { name: 'Lobo Negro', image: 'https://images.unsplash.com/photo-1605051923053-f72535099e4b?w=800&q=80', desc: 'Misterioso, nocturno y profundamente intuitivo. Te guía la luna.', stats: { agilidad: 75, fuerza: 90, misticismo: 95 }, color: 'from-slate-700 to-slate-900', text: 'text-slate-100', border: 'border-slate-500' },
            lobo_gris: { name: 'Lobo Gris', image: 'https://images.unsplash.com/photo-1590513904975-f9380da1262d?w=800&q=80', desc: 'El alma de la manada. Eres protector, comunicativo y salvaje.', stats: { agilidad: 80, fuerza: 80, misticismo: 60 }, color: 'from-stone-300 to-stone-500', text: 'text-stone-900', border: 'border-stone-600' },
            zorro_rojo: { name: 'Zorro Rojo', image: 'https://images.unsplash.com/photo-1516934824040-9759eb54bc7b?w=800&q=80', desc: 'Astuto, juguetón y adaptable. Encuentras magia en lugares ocultos.', stats: { agilidad: 95, fuerza: 40, misticismo: 85 }, color: 'from-orange-300 to-red-400', text: 'text-red-950', border: 'border-red-600' },
            gato_callejero: { name: 'Gato Urbano', image: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=800&q=80', desc: 'Independiente, territorial y superviviente nato.', stats: { agilidad: 90, fuerza: 45, misticismo: 50 }, color: 'from-gray-300 to-gray-500', text: 'text-gray-900', border: 'border-gray-600' },
            pantera: { name: 'Pantera Negra', image: 'https://images.unsplash.com/photo-1616035252875-103328ce7dcc?w=800&q=80', desc: 'Sigiloso, poderoso e independiente. Te mueves en las sombras.', stats: { agilidad: 90, fuerza: 85, misticismo: 80 }, color: 'from-violet-900 to-black', text: 'text-violet-100', border: 'border-violet-500' },
            tiburon_blanco: { name: 'Tiburón Blanco', image: 'https://images.unsplash.com/photo-1560275619-4662e36fa65c?w=800&q=80', desc: 'Poderoso, incomprendido y en constante movimiento.', stats: { agilidad: 85, fuerza: 95, misticismo: 40 }, color: 'from-cyan-300 to-blue-500', text: 'text-cyan-950', border: 'border-cyan-600' },
            cuervo: { name: 'Cuervo', image: 'https://images.unsplash.com/photo-1506540306786-81534431e7f6?w=800&q=80', desc: 'Sumamente inteligente, coleccionista y con conexión al misticismo.', stats: { agilidad: 85, fuerza: 30, misticismo: 100 }, color: 'from-fuchsia-900 to-slate-900', text: 'text-fuchsia-100', border: 'border-fuchsia-500' }
        };

        const getAstrologyData = (dateString) => {
            if (!dateString) return { zodiac: '?', chinese: '?', moon: '?', element: '?' };
            const d = new Date(dateString);
            const day = d.getDate(); const month = d.getMonth() + 1; const year = d.getFullYear();
            let z = '', el = '';
            if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) { z = 'Aries'; el = 'Fuego 🔥'; }
            else if ((month === 4 && day >= 20) || (month === 5 && day <= 20)) { z = 'Tauro'; el = 'Tierra 🌿'; }
            else if ((month === 5 && day >= 21) || (month === 6 && day <= 20)) { z = 'Géminis'; el = 'Aire 💨'; }
            else if ((month === 6 && day >= 21) || (month === 7 && day <= 22)) { z = 'Cáncer'; el = 'Agua 💧'; }
            else if ((month === 7 && day >= 23) || (month === 8 && day <= 22)) { z = 'Leo'; el = 'Fuego 🔥'; }
            else if ((month === 8 && day >= 23) || (month === 9 && day <= 22)) { z = 'Virgo'; el = 'Tierra 🌿'; }
            else if ((month === 9 && day >= 23) || (month === 10 && day <= 22)) { z = 'Libra'; el = 'Aire 💨'; }
            else if ((month === 10 && day >= 23) || (month === 11 && day <= 21)) { z = 'Escorpio'; el = 'Agua 💧'; }
            else if ((month === 11 && day >= 22) || (month === 12 && day <= 21)) { z = 'Sagitario'; el = 'Fuego 🔥'; }
            else if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) { z = 'Capricornio'; el = 'Tierra 🌿'; }
            else if ((month === 1 && day >= 20) || (month === 2 && day <= 18)) { z = 'Acuario'; el = 'Aire 💨'; }
            else { z = 'Piscis'; el = 'Agua 💧'; }

            const animals = ['Mono', 'Gallo', 'Perro', 'Cerdo', 'Rata', 'Buey', 'Tigre', 'Conejo', 'Dragón', 'Serpiente', 'Caballo', 'Cabra'];
            const c = animals[year % 12];
            const phase = ((d.getTime() / 1000 - 947182440) % 2551443) / 2551443;
            let moonPhase = phase < 0.03 || phase > 0.97 ? 'Luna Nueva 🌑' : phase < 0.22 ? 'Creciente 🌒' : phase < 0.53 ? 'Llena 🌕' : 'Menguante 🌘';

            return { zodiac: z, chinese: c, moon: moonPhase, element: el };
        };

        function App() {
            const [view, setView] = useState('home'); 
            const [currentUser, setCurrentUser] = useState(null);
            const [toast, setToast] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem('santuario_v5_data');
                if (saved) setCurrentUser(JSON.parse(saved));
            }, []);

            const saveUserData = (data) => {
                setCurrentUser(data);
                localStorage.setItem('santuario_v5_data', JSON.stringify(data));
            };

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            const cardStyle = "bg-white border-4 border-gray-900 rounded-2xl shadow-[6px_6px_0px_0px_rgba(17,24,39,1)] p-6 md:p-8";
            const btnStyle = "font-black text-lg border-4 border-gray-900 rounded-xl shadow-[4px_4px_0px_0px_rgba(17,24,39,1)] active:shadow-none active:translate-y-1 active:translate-x-1 transition-all px-6 py-3 flex items-center justify-center gap-2 cursor-pointer";

            return (
                <div className="min-h-screen pb-12">
                    {toast && <div className="fixed bottom-10 right-10 z-50 bg-gray-900 text-white p-4 rounded-xl border-2 border-gray-700 shadow-xl font-bold animate-fade-in">{toast}</div>}
                    
                    <nav className="border-b-4 border-gray-900 bg-white px-4 md:px-8 py-3 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView(currentUser ? 'dashboard' : 'home')}>
                            <div className="bg-purple-600 p-2 rounded-xl border-2 border-gray-900 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] text-white">
                                <i className="fas fa-paw text-xl"></i>
                            </div>
                            <h1 className="text-xl font-black tracking-tight">Santuario Therian</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            {currentUser && (
                                <button onClick={() => setView('chat')} className={`font-black ${view === 'chat' ? 'bg-purple-600 text-white' : 'text-purple-700 bg-purple-50'} px-4 py-2 rounded-xl border-2 border-purple-900`}>
                                    <i className="fas fa-magic"></i> <span className="hidden sm:inline">Oráculo</span>
                                </button>
                            )}
                            {currentUser ? (
                                <button onClick={() => {setCurrentUser(null); setView('home'); localStorage.removeItem('santuario_v5_data');}} className="font-bold text-red-600 px-2"><i className="fas fa-power-off text-xl"></i></button>
                            ) : (
                                <button onClick={() => setView('auth')} className="bg-purple-400 text-white font-black border-2 border-gray-900 rounded-xl px-6 py-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Entrar</button>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 mt-4">
                        {view === 'home' && <HomeView setView={setView} btnStyle={btnStyle} />}
                        {view === 'auth' && <AuthView onLogin={saveUserData} setView={setView} cardStyle={cardStyle} btnStyle={btnStyle} />}
                        {view === 'dashboard' && <DashboardView user={currentUser} setView={setView} saveUser={saveUserData} cardStyle={cardStyle} btnStyle={btnStyle} astro={getAstrologyData(currentUser?.dob)} showToast={showToast} />}
                        {view === 'quiz' && <QuizView onFinish={(res) => { saveUserData({ ...currentUser, theriotype: theriotypesDB[res] }); setView('dashboard'); }} cardStyle={cardStyle} btnStyle={btnStyle} />}
                        {view === 'chat' && <ChatView cardStyle={cardStyle} btnStyle={btnStyle} user={currentUser} />}
                    </main>
                </div>
            );
        }

        function HomeView({ setView, btnStyle }) {
            return (
                <div className="flex flex-col items-center text-center space-y-10 animate-fade-in py-12">
                    <div className="bg-white border-4 border-gray-900 p-2 px-6 rounded-full font-black text-purple-600 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform -rotate-2 uppercase tracking-widest">✨ Tu alma animal te espera</div>
                    <h2 className="text-6xl md:text-8xl font-black leading-none text-gray-900">Revela tu <span className="text-purple-600">Esencia.</span></h2>
                    <p className="text-xl font-bold text-gray-600 max-w-xl">Descubre tu theriotipo con tecnología de IA y astrología antigua. Una experiencia única en la manada.</p>
                    <button onClick={() => setView('auth')} className={`${btnStyle} bg-purple-500 text-white text-2xl px-12 py-6`}>Entrar al Santuario <i className="fas fa-arrow-right ml-2"></i></button>
                </div>
            );
        }

        function AuthView({ onLogin, setView, cardStyle, btnStyle }) {
            const [name, setName] = useState('');
            const [dob, setDob] = useState('');
            const [isLogin, setIsLogin] = useState(true);
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                const currentDB = JSON.parse(localStorage.getItem('santuario_users_db') || '[]');
                
                if (isLogin) {
                    const user = currentDB.find(u => u.username === name.toLowerCase() && u.password === password);
                    if (user) {
                        onLogin(user);
                        setView('dashboard');
                    } else {
                        setError('Usuario o contraseña incorrectos.');
                    }
                } else {
                    if (currentDB.some(u => u.username === name.toLowerCase())) {
                        return setError('El usuario ya existe. Ve a Acceso.');
                    }
                    if (!dob) return setError('La fecha es necesaria para tu carta astral.');
                    
                    const newUser = { username: name.toLowerCase(), password, dob, joined: new Date().toLocaleDateString(), theriotype: null, journal: [] };
                    currentDB.push(newUser);
                    localStorage.setItem('santuario_users_db', JSON.stringify(currentDB));
                    onLogin(newUser);
                    setView('dashboard');
                }
            };

            return (
                <div className="max-w-md mx-auto mt-12 animate-fade-in">
                    <div className={cardStyle}>
                        <div className="flex justify-center mb-6"><div className="bg-purple-200 p-4 rounded-full border-4 border-gray-900 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"><i className="fas fa-user text-4xl"></i></div></div>
                        
                        <div className="flex gap-4 mb-8">
                            <button onClick={() => {setIsLogin(true); setError('');}} className={`flex-1 pb-2 font-black text-xl border-b-4 ${isLogin ? 'border-gray-900 text-gray-900' : 'border-gray-200 text-gray-400'}`}>Acceso</button>
                            <button onClick={() => {setIsLogin(false); setError('');}} className={`flex-1 pb-2 font-black text-xl border-b-4 ${!isLogin ? 'border-gray-900 text-gray-900' : 'border-gray-200 text-gray-400'}`}>Nuevo</button>
                        </div>

                        {error && <div className="bg-red-100 text-red-800 p-3 rounded-xl border-2 border-red-900 font-bold mb-4">{error}</div>}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div><label className="font-black">¿Cómo te llamas?</label><input type="text" className="w-full p-4 border-4 border-gray-900 rounded-xl outline-none focus:bg-purple-50" placeholder="Ej: GhostWolf" value={name} onChange={e=>setName(e.target.value)}/></div>
                            <div><label className="font-black">Contraseña Segura</label><input type="password" required className="w-full p-4 border-4 border-gray-900 rounded-xl outline-none focus:bg-purple-50" value={password} onChange={e=>setPassword(e.target.value)}/></div>
                            {!isLogin && (
                                <div><label className="font-black">Fecha de Nacimiento</label><input type="date" className="w-full p-4 border-4 border-gray-900 rounded-xl outline-none focus:bg-purple-50" value={dob} onChange={e=>setDob(e.target.value)}/></div>
                            )}
                            <button type="submit" className={`${btnStyle} bg-purple-400 w-full mt-4 text-white`}>{isLogin ? 'Despertar' : 'Crear mi Alma'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        function DashboardView({ user, setView, saveUser, cardStyle, btnStyle, astro, showToast }) {
            const [text, setText] = useState('');
            const [isDownloading, setIsDownloading] = useState(false);

            // Actualiza también la base de datos general de usuarios cuando se guarda algo
            const updateAndSaveUser = (updatedUser) => {
                saveUser(updatedUser);
                const currentDB = JSON.parse(localStorage.getItem('santuario_users_db') || '[]');
                const newDB = currentDB.map(u => u.username === updatedUser.username ? updatedUser : u);
                localStorage.setItem('santuario_users_db', JSON.stringify(newDB));
            };

            const shareToSocials = (platform) => {
                const url = window.location.href; 
                let shareText = "¡Descubre tu Theriotipo en Santuario Therian!";
                if(user && user.theriotype) {
                    shareText = `¡Soy un ${user.theriotype.name}! Mi elemento es ${astro.element}. Descubre tu Theriotipo en Santuario Therian:`;
                }

                if (platform === 'whatsapp') {
                    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText + ' ' + url)}`, '_blank');
                } else if (platform === 'twitter') {
                    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(url)}`, '_blank');
                }
            };

            const shareNative = async () => {
                let shareText = "¡Descubre tu Theriotipo en Santuario Therian!";
                if(user && user.theriotype) {
                    shareText = `¡Soy un ${user.theriotype.name}! Mi elemento es ${astro.element}.`;
                }

                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Santuario Therian',
                            text: shareText,
                            url: window.location.href,
                        });
                    } catch (err) {
                        console.log("Compartir cancelado o error", err);
                    }
                } else {
                    showToast("Tu navegador no soporta el botón de compartir directo.");
                }
            };

            const downloadCard = async () => {
                const element = document.getElementById('certificate');
                if (!element || isDownloading) return;
                
                setIsDownloading(true);
                showToast("Generando carta...");

                try {
                    // Usamos html2canvas global (cargado en el head)
                    const canvas = await window.html2canvas(element, {
                        useCORS: true,
                        scale: 2,
                        backgroundColor: null
                    });

                    const dataUrl = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.download = `Therian_${user.username}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch (error) {
                    console.error(error);
                    showToast("Error al descargar. Haz captura de pantalla manual por ahora.");
                } finally {
                    setIsDownloading(false);
                }
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-white border-4 border-gray-900 p-8 rounded-3xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] flex flex-col md:flex-row justify-between items-center">
                        <h2 className="text-4xl font-black capitalize">Refugio de {user.username}</h2>
                        <div className="flex gap-4 mt-4 md:mt-0">
                            <button onClick={()=>setView('quiz')} className="font-black text-purple-600 underline hover:text-purple-800 transition-colors">Repetir Test</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="space-y-6">
                            <div className={`${cardStyle} bg-slate-900 text-white`}>
                                <h3 className="text-xl font-black mb-4 border-b border-slate-700 pb-2 flex items-center gap-2"><i className="fas fa-moon text-amber-300"></i> Stats Cósmicos</h3>
                                <div className="space-y-3 font-bold">
                                    <div className="flex justify-between p-2 bg-slate-800 rounded-lg"><span>Zodiaco</span> <span className="text-purple-400">{astro.zodiac}</span></div>
                                    <div className="flex justify-between p-2 bg-slate-800 rounded-lg"><span>Año Chino</span> <span className="text-purple-400">{astro.chinese}</span></div>
                                    <div className="flex justify-between p-2 bg-slate-800 rounded-lg"><span>Luna</span> <span className="text-purple-400">{astro.moon}</span></div>
                                    <div className="flex justify-between p-2 bg-slate-800 rounded-lg"><span>Elemento</span> <span className="text-purple-400">{astro.element}</span></div>
                                </div>
                            </div>
                            <div className={`${cardStyle} bg-amber-50`}>
                                <h3 className="text-xl font-black mb-4"><i className="fas fa-book-open mr-2"></i> Diario de Shifts</h3>
                                <textarea className="w-full p-3 border-4 border-gray-900 rounded-xl h-24 mb-2 outline-none focus:bg-white" placeholder="Registra tu conexión hoy..." value={text} onChange={e=>setText(e.target.value)}></textarea>
                                <button onClick={()=>{if(text){updateAndSaveUser({...user, journal:[{date:new Date().toLocaleDateString(), text}, ...(user.journal||[])]}); setText(''); showToast("Entrada guardada en tu alma.");}}} className={`${btnStyle} bg-amber-300 w-full py-2`}>Guardar Registro</button>
                            </div>
                        </div>

                        <div className="lg:col-span-2 flex flex-col items-center">
                            {user.theriotype ? (
                                <div className="w-full max-w-sm tcg-card">
                                    <div id="certificate" className={`aspect-[3/4] bg-gradient-to-br ${user.theriotype.color} border-8 ${user.theriotype.border} rounded-3xl p-6 shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] relative flex flex-col`}>
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className={`text-3xl font-black ${user.theriotype.text}`}>{user.theriotype.name}</h4>
                                            <div className="bg-white p-2 rounded-full border-4 border-gray-900 shadow-sm"><i className="fas fa-certificate text-amber-500"></i></div>
                                        </div>
                                        <div className="flex-grow bg-white border-4 border-gray-900 rounded-2xl overflow-hidden mb-4 shadow-inner relative flex justify-center items-center">
                                            <img src={user.theriotype.image} className="w-full h-full object-cover" alt={user.theriotype.name} crossOrigin="anonymous"/>
                                            <div className="absolute top-2 right-2 bg-white/80 px-2 py-1 rounded-lg border-2 border-black font-black text-[10px] uppercase">Therian Class</div>
                                        </div>
                                        <div className="bg-white/95 border-4 border-gray-900 rounded-xl p-4 text-xs font-black shadow-sm">
                                            <p className="italic mb-3 text-center border-b-2 border-gray-100 pb-2">"{user.theriotype.desc}"</p>
                                            <div className="space-y-2">
                                                <div className="flex justify-between"><span>AGILIDAD</span><span>{user.theriotype.stats.agilidad}%</span></div>
                                                <div className="h-2 bg-gray-200 rounded-full overflow-hidden border-2 border-gray-900"><div className="h-full bg-blue-500" style={{width:`${user.theriotype.stats.agilidad}%`}}></div></div>
                                                <div className="flex justify-between"><span>FUERZA</span><span>{user.theriotype.stats.fuerza}%</span></div>
                                                <div className="h-2 bg-gray-200 rounded-full overflow-hidden border-2 border-gray-900"><div className="h-full bg-red-500" style={{width:`${user.theriotype.stats.fuerza}%`}}></div></div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col gap-3 w-full mt-6">
                                        <div className="flex gap-2">
                                            <button onClick={downloadCard} disabled={isDownloading} className={`${btnStyle} bg-emerald-300 flex-1 text-sm py-3 disabled:opacity-50`}>
                                                {isDownloading ? "..." : <><i className="fas fa-download"></i> Guardar</>}
                                            </button>
                                            <button onClick={shareNative} className={`${btnStyle} bg-purple-200 flex-1 text-sm py-3`}>
                                                <i className="fas fa-share-nodes"></i> Compartir
                                            </button>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={()=>shareToSocials('whatsapp')} className={`${btnStyle} bg-green-200 flex-1 text-sm py-2`}><i className="fab fa-whatsapp"></i> WhatsApp</button>
                                            <button onClick={()=>shareToSocials('twitter')} className={`${btnStyle} bg-blue-200 flex-1 text-sm py-2`}><i className="fab fa-twitter"></i> Twitter</button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className={`${cardStyle} text-center border-dashed border-gray-300 w-full py-20 bg-gray-50 flex flex-col items-center justify-center`}>
                                    <div className="bg-white p-6 rounded-full border-4 border-gray-200 mb-6"><i className="fas fa-fingerprint text-6xl text-gray-200"></i></div>
                                    <h3 className="text-2xl font-black text-gray-400">Identidad no Revelada</h3>
                                    <button onClick={()=>setView('quiz')} className={`${btnStyle} bg-purple-500 text-white mt-8 px-10`}>Iniciar Revelación</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function QuizView({ onFinish, cardStyle, btnStyle }) {
            const [step, setStep] = useState(0);
            const [scores, setScores] = useState({ lobo_artico:0, lobo_negro:0, lobo_gris:0, zorro_rojo:0, gato_callejero:0, pantera:0, tiburon_blanco:0, cuervo:0 });
            const [currentPath, setCurrentPath] = useState(null);

            const baseQuestions = [
                { q: "¿Qué entorno te transmite paz absoluta?", opts: [{ t: "Bosques densos y fríos", pts: ['lobo_artico', 'lobo_gris'] }, { t: "La ciudad por la noche", pts: ['gato_callejero', 'pantera'] }, { t: "El vasto océano", pts: ['tiburon_blanco'] }, { t: "Alturas y cielos", pts: ['cuervo'] }] },
                { q: "Ante una amenaza inesperada...", opts: [{ t: "Muestro agresividad inmediata", pts: ['lobo_negro', 'pantera'] }, { t: "Me pongo alerta y esquivo", pts: ['gato_callejero', 'zorro_rojo'] }, { t: "Huyo hacia una zona segura", pts: ['tiburon_blanco'] }, { t: "Tomo altura para observar", pts: ['cuervo'] }] },
                { q: "¿Cómo es tu relación con la soledad?", opts: [{ t: "Necesito estar con mi grupo", pts: ['lobo_gris'] }, { t: "Disfruto la completa independencia", pts: ['pantera', 'gato_callejero'] }, { t: "Soy adaptable, depende del día", pts: ['zorro_rojo', 'lobo_artico'] }, { t: "Me aíslo para pensar", pts: ['cuervo'] }] },
                { q: "Al moverte en la naturaleza, tu paso es...", opts: [{ t: "Firme, marcando el territorio", pts: ['lobo_negro', 'lobo_gris'] }, { t: "Silencioso e indetectable", pts: ['pantera', 'gato_callejero'] }, { t: "Fluido, sin encontrar resistencia", pts: ['tiburon_blanco'] }, { t: "Rápido y ágil", pts: ['zorro_rojo', 'cuervo'] }] },
            ];

            const pathQuestions = {
                canino: [
                    { q: "¿Cómo te comunicas con los tuyos?", opts: [{ t: "Vocalizaciones fuertes", pts: ['lobo_gris'] }, { t: "Miradas intensas", pts: ['lobo_negro'] }, { t: "Contacto físico", pts: ['lobo_artico'] }, { t: "Sonidos sutiles", pts: ['zorro_rojo'] }] },
                    { q: "¿En qué momento del día tienes más energía?", opts: [{ t: "En el frío del amanecer", pts: ['lobo_artico'] }, { t: "Bajo la luz de la luna llena", pts: ['lobo_negro'] }, { t: "Al atardecer con el grupo", pts: ['lobo_gris'] }, { t: "En el crepúsculo", pts: ['zorro_rojo'] }] },
                    { q: "¿Qué valoras más en ti?", opts: [{ t: "Mi lealtad inquebrantable", pts: ['lobo_gris'] }, { t: "Mi resistencia al dolor", pts: ['lobo_artico'] }, { t: "Mi astucia para resolver problemas", pts: ['zorro_rojo'] }, { t: "Mi conexión mística", pts: ['lobo_negro'] }] },
                    { q: "Si cazarás en este instante...", opts: [{ t: "Perseguiría hasta cansar a la presa", pts: ['lobo_artico'] }, { t: "Emboscaría desde las sombras", pts: ['lobo_negro'] }, { t: "Ataque coordinado", pts: ['lobo_gris'] }, { t: "Un salto rápido e inesperado", pts: ['zorro_rojo'] }] },
                    { q: "¿Qué te relaja profundamente?", opts: [{ t: "El sonido del viento", pts: ['lobo_artico'] }, { t: "La oscuridad total", pts: ['lobo_negro'] }, { t: "Estar acompañado en silencio", pts: ['lobo_gris'] }, { t: "Explorar cosas nuevas", pts: ['zorro_rojo'] }] },
                    { q: "Palabra que define tu aura:", opts: [{ t: "Resiliencia", pts: ['lobo_artico'] }, { t: "Misterio", pts: ['lobo_negro'] }, { t: "Hermandad", pts: ['lobo_gris'] }, { t: "Picardía", pts: ['zorro_rojo'] }] }
                ],
                felino: [
                    { q: "¿Cómo reaccionas cuando alguien invade tu espacio?", opts: [{ t: "Me voy a otro lado indignado", pts: ['gato_callejero'] }, { t: "Lo intimido para que se vaya", pts: ['pantera'] }, { t: "Lo ignoro fríamente", pts: ['gato_callejero'] }, { t: "Ataco si no retrocede", pts: ['pantera'] }] },
                    { q: "¿Dónde prefieres dormir?", opts: [{ t: "En lugares muy altos", pts: ['pantera'] }, { t: "En rincones cálidos y ocultos", pts: ['gato_callejero'] }, { t: "Donde caiga si estoy cansado", pts: ['gato_callejero'] }, { t: "En sombras donde nadie me vea", pts: ['pantera'] }] },
                    { q: "¿Cuál es tu mejor habilidad física?", opts: [{ t: "El equilibrio perfecto", pts: ['gato_callejero'] }, { t: "Una fuerza explosiva", pts: ['pantera'] }, { t: "Los reflejos inmediatos", pts: ['gato_callejero'] }, { t: "El sigilo absoluto", pts: ['pantera'] }] },
                    { q: "En un día lluvioso...", opts: [{ t: "Busco refugio desesperadamente", pts: ['gato_callejero'] }, { t: "Me molesta, pero lo soporto", pts: ['pantera'] }, { t: "Duermo todo el día", pts: ['gato_callejero'] }, { t: "Me escondo en la oscuridad", pts: ['pantera'] }] },
                    { q: "¿Qué te atrae visualmente?", opts: [{ t: "Cosas que se mueven rápido", pts: ['gato_callejero'] }, { t: "El contraste de luces y sombras", pts: ['pantera'] }, { t: "Lugares estrechos", pts: ['gato_callejero'] }, { t: "La luna llena", pts: ['pantera'] }] },
                    { q: "Palabra que define tu aura:", opts: [{ t: "Supervivencia", pts: ['gato_callejero'] }, { t: "Poder", pts: ['pantera'] }, { t: "Agilidad", pts: ['gato_callejero'] }, { t: "Oscuridad", pts: ['pantera'] }] }
                ],
                salvaje: [
                    { q: "Cuando observas el mundo, ¿cómo lo sientes?", opts: [{ t: "Lleno de corrientes que me llevan", pts: ['tiburon_blanco'] }, { t: "Un rompecabezas desde arriba", pts: ['cuervo'] }, { t: "Un océano de oportunidades", pts: ['tiburon_blanco'] }, { t: "Lleno de brillos que recolectar", pts: ['cuervo'] }] },
                    { q: "¿Qué te molesta más?", opts: [{ t: "Estar quieto mucho tiempo", pts: ['tiburon_blanco'] }, { t: "La falta de estimulación mental", pts: ['cuervo'] }, { t: "Que me encierren", pts: ['tiburon_blanco'] }, { t: "Las personas ruidosas", pts: ['cuervo'] }] },
                    { q: "Si fueses un elemento, serías...", opts: [{ t: "Agua fría e implacable", pts: ['tiburon_blanco'] }, { t: "Viento cortante", pts: ['cuervo'] }, { t: "Marea profunda", pts: ['tiburon_blanco'] }, { t: "Sombra fugaz", pts: ['cuervo'] }] },
                    { q: "Tu forma de obtener lo que quieres es...", opts: [{ t: "Avanzar directo hasta tomarlo", pts: ['tiburon_blanco'] }, { t: "Ingeniar un plan detallado", pts: ['cuervo'] }, { t: "Usar mi fuerza", pts: ['tiburon_blanco'] }, { t: "Esperar el momento exacto", pts: ['cuervo'] }] },
                    { q: "¿Qué sientes al ver una tormenta?", opts: [{ t: "Energía incontrolable bajo la superficie", pts: ['tiburon_blanco'] }, { t: "Emoción mística y conexión", pts: ['cuervo'] }, { t: "Indiferencia, estoy seguro abajo", pts: ['tiburon_blanco'] }, { t: "Ganas de volar sobre ella", pts: ['cuervo'] }] },
                    { q: "Palabra que define tu aura:", opts: [{ t: "Imparable", pts: ['tiburon_blanco'] }, { t: "Misterio e intelecto", pts: ['cuervo'] }, { t: "Temor infundado", pts: ['tiburon_blanco'] }, { t: "Magia", pts: ['cuervo'] }] }
                ]
            };

            const currentQuestionsList = step < 4 ? baseQuestions : pathQuestions[currentPath];
            const totalQuestions = 10;
            const currentQuestion = currentQuestionsList[step < 4 ? step : step - 4];

            const handleAnswer = (ptsArray) => {
                let newScores = { ...scores };
                ptsArray.forEach(p => { newScores[p] += 1; });
                setScores(newScores);

                if (step === 3) {
                    const caninoScore = newScores.lobo_artico + newScores.lobo_negro + newScores.lobo_gris + newScores.zorro_rojo;
                    const felinoScore = newScores.gato_callejero + newScores.pantera;
                    const salvajeScore = newScores.tiburon_blanco + newScores.cuervo;

                    if (caninoScore >= felinoScore && caninoScore >= salvajeScore) setCurrentPath('canino');
                    else if (felinoScore >= salvajeScore) setCurrentPath('felino');
                    else setCurrentPath('salvaje');
                }

                if (step + 1 === totalQuestions) {
                    let finalAnimal = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b);
                    onFinish(finalAnimal);
                } else {
                    setStep(step + 1);
                }
            };

            return (
                <div className="max-w-xl mx-auto py-12 animate-fade-in">
                    <div className={cardStyle}>
                        <div className="flex justify-between items-center mb-8">
                            <span className="font-black text-purple-600 bg-purple-50 px-3 py-1 rounded-lg border-2 border-purple-900">PASO {step + 1} / {totalQuestions}</span>
                            <div className="w-1/2 bg-gray-200 h-3 rounded-full border-2 border-gray-900 overflow-hidden">
                                <div className="bg-purple-500 h-full transition-all duration-500" style={{width: `${((step + 1) / totalQuestions) * 100}%`}}></div>
                            </div>
                        </div>
                        <h3 className="text-3xl font-black mb-10 leading-tight">{currentQuestion.q}</h3>
                        <div className="space-y-4">
                            {currentQuestion.opts.map((o, i) => (
                                <button key={i} onClick={() => handleAnswer(o.pts)} className="w-full text-left p-6 border-4 border-gray-900 rounded-2xl font-black text-xl hover:bg-purple-50 hover:-translate-y-1 transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-1 active:translate-x-1">
                                    {o.t}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ChatView({ cardStyle, btnStyle, user }) {
            const [msgs, setMsgs] = useState([{ s: 'b', t: `Saludos, ${user.username}. Soy el Oráculo. ¿Qué susurran los vientos sobre tu theriotipo hoy?` }]);
            const [inp, setInp] = useState('');
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [msgs]);

            const sendMessage = async () => {
                if (!inp.trim() || loading) return;
                const userText = inp;
                setInp('');
                const newMsgs = [...msgs, { s: 'u', t: userText }];
                setMsgs(newMsgs);
                setLoading(true);

                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const systemPrompt = `Eres el Oráculo del Santuario Therian. Guía espiritual experto en theriotipos e identidades animales. 
                Responde de forma mística pero clara. Usa referencias a la naturaleza y el instinto. 
                El usuario actual es ${user.username}, theriotipo: ${user.theriotype ? user.theriotype.name : 'Aún desconocido'}. 
                Responde siempre en español. Sé breve (máximo 3 frases).`;

                const history = newMsgs.map(m => ({
                    role: m.s === 'u' ? 'user' : 'model',
                    parts: [{ text: m.t }]
                }));

                const payload = {
                    contents: history,
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                let retries = 5;
                let delay = 1000;

                const callAPI = async () => {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error('API Error');
                        const data = await response.json();
                        const botText = data.candidates?.[0]?.content?.parts?.[0]?.text || "El bosque está en silencio... intenta preguntar de nuevo.";
                        setMsgs(prev => [...prev, { s: 'b', t: botText }]);
                    } catch (error) {
                        if (retries > 0) {
                            retries--;
                            setTimeout(callAPI, delay);
                            delay *= 2;
                        } else {
                            setMsgs(prev => [...prev, { s: 'b', t: "He perdido la conexión con los ancestros. Prueba en unos momentos." }]);
                        }
                    } finally {
                        setLoading(false);
                    }
                };

                callAPI();
            };

            return (
                <div className="max-w-3xl mx-auto h-[75vh] flex flex-col animate-fade-in">
                    <div className="bg-purple-600 border-4 border-gray-900 rounded-t-3xl p-4 flex items-center gap-3 shadow-[6px_0px_0px_0px_rgba(0,0,0,1)]">
                        <div className="bg-white p-2 rounded-xl border-2 border-black"><i className="fas fa-magic text-purple-600"></i></div>
                        <div className="text-white">
                            <h3 className="font-black text-xl leading-none">Voz del Oráculo</h3>
                            <span className="text-[10px] font-bold uppercase tracking-widest opacity-80">Conexión Ancestral Activa</span>
                        </div>
                    </div>
                    <div ref={scrollRef} className={`${cardStyle} flex-grow overflow-y-auto mb-4 space-y-4 p-6 rounded-t-none border-t-0 custom-scrollbar bg-white/50 backdrop-blur-sm`}>
                        {msgs.map((m, i) => (
                            <div key={i} className={`flex ${m.s === 'u' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-4 rounded-2xl border-4 border-gray-900 font-bold max-w-[85%] shadow-[4px_4px_0px_0px_rgba(17,24,39,1)] ${m.s === 'u' ? 'bg-emerald-100 rounded-tr-none' : 'bg-purple-100 rounded-tl-none'}`}>
                                    {m.t}
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div className="flex justify-start">
                                <div className="p-4 rounded-2xl border-4 border-gray-900 font-black bg-purple-50 animate-pulse flex items-center gap-2">
                                    <i className="fas fa-circle-notch animate-spin"></i> Consultando a los ancestros...
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="flex gap-3 bg-white p-4 rounded-2xl border-4 border-gray-900 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
                        <input 
                            className="flex-grow p-4 border-2 border-gray-200 rounded-xl font-bold outline-none focus:border-purple-500 transition-colors" 
                            placeholder="Haz una pregunta espiritual..." 
                            value={inp} 
                            onChange={e=>setInp(e.target.value)} 
                            onKeyDown={e=>e.key==='Enter' && sendMessage()}
                            disabled={loading}
                        />
                        <button 
                            onClick={sendMessage}
                            disabled={loading || !inp.trim()}
                            className={`${btnStyle} bg-purple-500 text-white shadow-none hover:bg-purple-600 disabled:bg-gray-300 disabled:cursor-not-allowed`}
                        >
                            <i className="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
